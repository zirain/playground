apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-route
spec:
  hostnames:
    - backend.example.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: backend-1
          port: 443
          weight: 1
          filters:
            - type: URLRewrite
              urlRewrite:
                hostname: backend-1.example.net
        - group: gateway.envoyproxy.io
          kind: Backend
          name: backend-2
          port: 443
          weight: 1
      timeouts:
        request: 30s
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: backend-1
spec:
  type: Endpoints
  fallback: false
  endpoints:
    - fqdn:
        hostname: backend-1.example.net
        port: 443
      hostname: backend-1.example.net
  tls:
    insecureSkipVerify: false
    sni: backend-1.example.net
    wellKnownCACertificates: System
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: backend-2
spec:
  type: Endpoints
  fallback: false
  endpoints:
    - fqdn:
        hostname: backend-2.example.net
        port: 443
      hostname: backend-2.example.net
  tls:
    insecureSkipVerify: false
    sni: backend-2.example.net
    wellKnownCACertificates: System
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: backend-healthcheck
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: my-route
  healthCheck:
    active:
      type: HTTP
      http:
        method: GET
        path: /healthz
        expectedStatuses:
          - 200
      interval: 5s
      timeout: 2s
      healthyThreshold: 1
      unhealthyThreshold: 3
    panicThreshold: 50
---

