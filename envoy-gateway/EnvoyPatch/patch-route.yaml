apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gtw-1
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
    - name: http-8080
      protocol: HTTP
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gtw-1
      sectionName: http
  rules:
    - backendRefs:
        - kind: Service
          name: backend
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  name: patch-per-route
spec:
  jsonPatches:
    - name: default/gtw-1/http
      operation:
        op: add
        path: /default_filter_chain/filters/0/typed_config/http_filters/0
        value:
          disabled: true
          name: envoy.filters.http.lua_0
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            defaultSourceCode:
              inlineString: ""
      type: type.googleapis.com/envoy.config.listener.v3.Listener
    - name: default/gtw-1/http
      operation:
        jsonPath: ..routes[?(@.name=~"^httproute/default/backend")]
        op: add
        path: typedPerFilterConfig/envoy.filters.http.lua_0
        value:
          '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
          sourceCode:
            inlineString: function envoy_on_response(response_handle) response_handle:logWarn('Goodbye.')
              end
      type: type.googleapis.com/envoy.config.route.v3.RouteConfiguration
    - name: default/gtw-1/http-8080
      operation:
        op: add
        path: /default_filter_chain/filters/0/typed_config/http_filters/0
        value:
          disabled: true
          name: envoy.filters.http.lua_0
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            defaultSourceCode:
              inlineString: ""
      type: type.googleapis.com/envoy.config.listener.v3.Listener
    - name: default/gtw-1/http-8080
      operation:
        jsonPath: ..routes[?(@.name=~"^httproute/default/backend")]
        op: add
        path: typedPerFilterConfig/envoy.filters.http.lua_0
        value:
          '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
          sourceCode:
            inlineString: function envoy_on_response(response_handle) response_handle:logWarn('Goodbye.')
              end
      type: type.googleapis.com/envoy.config.route.v3.RouteConfiguration
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: gtw-1
  type: JSONPatch
