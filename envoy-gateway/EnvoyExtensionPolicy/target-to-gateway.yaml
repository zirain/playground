apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
  rules:
    - backendRefs:
        - kind: Service
          name: backend
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: lua-per-gateway-1
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
  lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          request_handle:headers():add("X-Lua-Filter", "applied-at-gateway-class")
          request_handle:logInfo("Lua filter executed for hostname: " .. (request_handle:headers():get(":authority") or "unknown"))
        end
        function envoy_on_response(response_handle)
          response_handle:headers():add("X-Lua-Response", "true")
        end
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  name: modify-lua-per-route
spec:
  jsonPatches:
    - name: gateway-namespace/eg/http
      operation:
        jsonPath: ..routes[?(@.name=~"^default/eg/http")]
        op: add
        path: typedPerFilterConfig/envoy.filters.http.lua/0
        value:
          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
          sourceCode:
            inlineString: |
              function envoy_on_request(request_handle)
                request_handle:headers():add("X-Lua-Filter", "applied-at-gateway-class")
                request_handle:logInfo("Lua filter executed for hostname: " .. (request_handle:headers():get(":authority") or "unknown"))
              end
              function envoy_on_response(response_handle)
                response_handle:headers():add("X-Lua-Response", "true")
              end
      type: type.googleapis.com/envoy.config.route.v3.RouteConfiguration
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: eg
  type: JSONPatch
