##################################################################################################
# httpbin service
##################################################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: httpbin
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  labels:
    app: httpbin
    service: httpbin
spec:
  ports:
    - name: tcp
      port: 8000
      targetPort: 8080
  selector:
    app: httpbin
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin-headless
  annotations:
    # adding this annotations will tell istio to ignore this service,
    # it will reduce the number of listener, this's very usefull when
    # you have a headless service which select a daemonset.
    networking.istio.io/exportTo: "~"
  labels:
    app: httpbin
    service: httpbin
spec:
  clusterIP: None
  ports:
    - name: tcp
      port: 8000
      targetPort: 8080
  selector:
    app: httpbin
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  labels:
    app: httpbin
    service: httpbin
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8080
  selector:
    app: httpbin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
      version: v1
  template:
    metadata:
      labels:
        app: httpbin
        version: v1
    spec:
      serviceAccountName: httpbin
      containers:
        - image: docker.io/mccutchen/go-httpbin:v2.15.0
          imagePullPolicy: IfNotPresent
          name: httpbin
          ports:
            - containerPort: 8080
